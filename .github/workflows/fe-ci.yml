name: CI Frontend

on:
    push:
        paths:
            - 'fe/**'
    pull_request:
        paths:
            - 'fe/**'

jobs:
    frontend:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: fe

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - run: npm install
            - run: npm run build
